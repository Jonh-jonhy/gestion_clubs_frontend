<!-- src/app/features/not-found/not-found.html -->

<div class="min-h-screen bg-gray-50 flex flex-col
            items-center justify-center px-4 page-anim">

  <!-- Numéro 404 animé -->
  <div class="relative mb-8">
    <p class="text-[8rem] md:text-[12rem] font-black
              text-gray-100 leading-none select-none
              number-anim">
      404
    </p>
    <!-- Icône centrée sur le 404 -->
    <div class="absolute inset-0 flex items-center
                justify-center">
      <div class="w-20 h-20 bg-primary-700 rounded-2xl
                  flex items-center justify-center
                  shadow-lg icon-bounce">
        <svg class="w-10 h-10 text-white" fill="none"
             stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
                stroke-width="1.5"
                d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15
                   10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Texte -->
  <div class="text-center mb-8 content-anim">
    <h1 class="text-2xl md:text-3xl font-black text-gray-900 mb-3">
      Page introuvable
    </h1>
    <p class="text-sm text-gray-500 max-w-sm leading-relaxed">
      La page que vous cherchez n'existe pas ou a été déplacée.
      Pas de panique, retournez à l'accueil !
    </p>
  </div>

  <!-- Boutons -->
  <div class="flex flex-col sm:flex-row items-center
              gap-3 buttons-anim">

    <a [routerLink]="lienAccueil"
       class="inline-flex items-center gap-2 bg-primary-700
              hover:bg-primary-800 text-white font-semibold
              px-6 py-3 rounded-xl transition-all duration-200
              shadow-sm hover:shadow-md hover:shadow-primary-700/25
              hover:-translate-y-0.5">
      <svg class="w-4 h-4" fill="none" stroke="currentColor"
           viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              stroke-width="2"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3
                 m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1
                 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1
                 0 001 1m-6 0h6"/>
      </svg>
      Retour à l'accueil
    </a>

    <button (click)="history.back()"
            class="inline-flex items-center gap-2 border
                   border-gray-200 hover:border-gray-300
                   text-gray-600 font-semibold px-6 py-3
                   rounded-xl transition-all duration-200
                   hover:-translate-y-0.5 bg-white">
      <svg class="w-4 h-4" fill="none" stroke="currentColor"
           viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      Page précédente
    </button>

  </div>

  <!-- Footer -->
  <p class="mt-12 text-xs text-gray-400">
    © {{ annee }} ClubISJ — Institut Saint Jean de Yaoundé
  </p>

</div>
