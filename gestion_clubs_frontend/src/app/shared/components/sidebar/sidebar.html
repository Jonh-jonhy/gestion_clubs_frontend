<!-- src/app/shared/components/sidebar/sidebar.html -->

<!-- ── Overlay mobile (fond sombre) ──────────────────────────── -->
@if (menuMobileOuvert()) {
  <div class="fixed inset-0 z-30 bg-black/40 md:hidden
              backdrop-blur-sm overlay-anim"
       (click)="fermerMenuMobile()">
  </div>
}

<!-- ── Sidebar ───────────────────────────────────────────────── -->
<aside class="fixed top-14 left-0 bottom-0 z-40
              w-52 bg-white border-r border-gray-100
              flex flex-col justify-between
              py-4 px-3 overflow-y-auto
              transition-transform duration-300 ease-in-out
              sidebar-slide-in"
       [class.-translate-x-full]="!menuMobileOuvert() && isMobile()"
       [class.translate-x-0]="menuMobileOuvert() || !isMobile()"
       [class.md:translate-x-0]="true">

  <!-- Navigation -->
  <nav class="flex flex-col gap-1">

    <a routerLink="/dashboard"
       routerLinkActive="!text-primary-700 !bg-primary-50
                         font-semibold active-link"
       [routerLinkActiveOptions]="{exact: true}"
       class="nav-item"
       (click)="fermerMenuMobile()">
      <svg class="w-4 h-4 shrink-0" fill="none"
           stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              stroke-width="2"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3
                 m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1
                 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1
                 0 001 1m-6 0h6"/>
      </svg>
      <span>Accueil</span>
    </a>

    <a routerLink="/clubs"
       routerLinkActive="!text-primary-700 !bg-primary-50
                         font-semibold active-link"
       class="nav-item"
       (click)="fermerMenuMobile()">
      <svg class="w-4 h-4 shrink-0" fill="none"
           stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              stroke-width="2"
              d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10
                 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3
                 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283
                 .356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3
                 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      <span>Mes Clubs</span>
    </a>

    <a routerLink="/publications"
       routerLinkActive="!text-primary-700 !bg-primary-50
                         font-semibold active-link"
       class="nav-item"
       (click)="fermerMenuMobile()">
      <svg class="w-4 h-4 shrink-0" fill="none"
           stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0
                 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1
                 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      <span>Publications</span>
    </a>

    <a routerLink="/notifications"
       routerLinkActive="!text-primary-700 !bg-primary-50
                         font-semibold active-link"
       class="nav-item"
       (click)="fermerMenuMobile()">
      <svg class="w-4 h-4 shrink-0" fill="none"
           stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              stroke-width="2"
              d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118
                 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0
                 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0
                 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3
                 3 0 11-6 0v-1m6 0H9"/>
      </svg>
      <span>Notifications</span>
      @if (notifCount() > 0) {
        <span class="ml-auto text-xs font-bold text-white
                     bg-primary-700 rounded-full px-1.5 py-0.5
                     min-w-5 text-center notif-badge-pop">
          {{ notifCount() }}
        </span>
      }
    </a>

    <a routerLink="/profil"
       routerLinkActive="!text-primary-700 !bg-primary-50
                         font-semibold active-link"
       class="nav-item"
       (click)="fermerMenuMobile()">
      <svg class="w-4 h-4 shrink-0" fill="none"
           stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7
                 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
      <span>Mon Profil</span>
    </a>

  </nav>

  <!-- Footer -->
  <div class="flex flex-col gap-1 pt-3 border-t border-gray-100">
    <a href="#"
       class="nav-item text-gray-400
              hover:text-gray-600 hover:!bg-gray-50">
      <svg class="w-4 h-4 shrink-0" fill="none"
           stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              stroke-width="2"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724
                 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724
                 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724
                 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724
                 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724
                 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724
                 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724
                 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608
                 2.296.07 2.572-1.065z"/>
        <path stroke-linecap="round" stroke-linejoin="round"
              stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      <span>Paramètres</span>
    </a>

    <button (click)="logout()"
            class="nav-item text-red-400
                   hover:text-red-600 hover:!bg-red-50
                   w-full text-left">
      <svg class="w-4 h-4 shrink-0" fill="none"
           stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3
                 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
      <span>Déconnexion</span>
    </button>
  </div>

</aside>

<!-- Spacer desktop uniquement -->
<div class="hidden md:block w-52 shrink-0"></div>
