<div class="fixed bottom-6 right-6 z-[100]
            flex flex-col gap-3 pointer-events-none
            max-w-sm w-full">

  @for (toast of toastService.toasts(); track trackById($index, toast)) {
    <div class="pointer-events-auto w-full rounded-2xl shadow-lg
                border border-gray-100 overflow-hidden
                toast-enter"
         [class]="getConfig(toast.type).bg + ' ' +
                  getConfig(toast.type).border">

      <div class="flex items-start gap-3 p-4">

        <!-- Icône -->
        <div class="w-8 h-8 rounded-full flex items-center
                    justify-center shrink-0"
             [class]="getConfig(toast.type).iconColor">

          @switch (getConfig(toast.type).icon) {
            @case ('check') {
              <svg class="w-4 h-4" fill="none"
                   stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      stroke-width="2.5" d="M5 13l4 4L19 7"/>
              </svg>
            }
            @case ('x') {
              <svg class="w-4 h-4" fill="none"
                   stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            }
            @case ('warning') {
              <svg class="w-4 h-4" fill="none"
                   stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      stroke-width="2"
                      d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54
                         0 2.502-1.667 1.732-3L13.732 4c-.77-1.333
                         -2.694-1.333-3.464 0L3.34 16c-.77 1.333
                         .192 3 1.732 3z"/>
              </svg>
            }
            @default {
              <svg class="w-4 h-4" fill="none"
                   stroke="currentColor" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 16v-4m0-4h.01"/>
              </svg>
            }
          }
        </div>

        <!-- Contenu -->
        <div class="flex-1 min-w-0">
          <p class="text-sm font-semibold"
             [class]="getConfig(toast.type).titleColor">
            {{ toast.titre }}
          </p>
          @if (toast.message) {
            <p class="text-xs text-gray-500 mt-0.5 leading-relaxed">
              {{ toast.message }}
            </p>
          }
        </div>

        <!-- Bouton fermer -->
        <button (click)="toastService.fermer(toast.id)"
                class="p-1 rounded-lg text-gray-400
                       hover:text-gray-600 hover:bg-gray-100
                       transition-colors shrink-0">
          <svg class="w-3.5 h-3.5" fill="none"
               stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                  stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>

      </div>

      <!-- Barre de progression -->
      <div class="h-0.5 bg-gray-100">
        <div class="h-full progress-bar"
             [class.bg-green-400]="toast.type === 'succes'"
             [class.bg-red-400]="toast.type === 'erreur'"
             [class.bg-blue-400]="toast.type === 'info'"
             [class.bg-orange-400]="toast.type === 'attention'"
             [style.animation-duration]="toast.duree + 'ms'">
        </div>
      </div>

    </div>
  }

</div>
